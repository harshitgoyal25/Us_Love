spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Use PORT env var from hosting provider (Render, Railway), fallback to 8080 locally
server.port=${PORT:8080}

# Database — injected via environment variables (from .env or hosting dashboard)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — injected via environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Hikari CP settings (Optimized for Supabase Pooler)
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE_TIME:60000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:3}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}